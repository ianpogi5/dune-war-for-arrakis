name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0 # full history for auto-generated release notes

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package dist
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          (cd dist && zip -r "../dune-war-for-arrakis-${TAG}.zip" .)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            "dune-war-for-arrakis-${TAG}.zip"
