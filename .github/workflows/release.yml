name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0 # full history for auto-generated release notes

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package dist
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          (cd dist && zip -r "../dune-war-for-arrakis-${TAG}.zip" .)

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          # Pull the section under "## [VER]" up to the next "## " heading (drop link-ref lines).
          awk -v ver="$VER" '
            /^## \[/ { if (inblk) exit; if (index($0, "## [" ver "]") == 1) { inblk=1; next } }
            inblk && /^\[[^]]+\]:/ { next }
            inblk { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ -s RELEASE_NOTES.md ]; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG.md section for $VER; falling back to auto-generated notes."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          ZIP="dune-war-for-arrakis-${TAG}.zip"
          if [ "${{ steps.notes.outputs.have_notes }}" = "true" ]; then
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md "$ZIP"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes "$ZIP"
          fi
